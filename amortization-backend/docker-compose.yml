version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: amortization-db
    environment:
      POSTGRES_DB: amortization_db
      POSTGRES_USER: amortization_user
      POSTGRES_PASSWORD: amortization_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amortization_user -d amortization_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
